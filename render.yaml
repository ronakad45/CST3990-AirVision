services:
  - type: web
    name: airvision
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAQ_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true